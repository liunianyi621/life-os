    function renderHeatmap() {
      const rows = buildMonthlyHeatRows(currentHeatmapMonth);
      const monthStart = monthDateFromKey(currentHeatmapMonth);
      const leadingDays = (monthStart.getDay() + 6) % 7;
      const maxNet = Math.max(...rows.map(row => Math.max(0, row.net)), 0);
      const maxLoss = Math.max(...rows.map(row => Math.max(0, -row.net)), 0);
      const today = dateKey();
      const weekdays = ["一", "二", "三", "四", "五", "六", "日"];

      els.heatmapMonthLabel.textContent = formatMonth(currentHeatmapMonth);
      els.heatmapChart.innerHTML = `
        <div class="calendar-heatmap">
          <div class="calendar-weekdays" aria-hidden="true">
            ${weekdays.map(day => `<span>${day}</span>`).join("")}
          </div>
          <div class="calendar-grid">
            ${Array.from({ length: leadingDays }, () => `<span class="calendar-empty" aria-hidden="true"></span>`).join("")}
            ${rows.map(row => {
              const level = calendarDayClass(row, maxNet, maxLoss);
              const todayClass = row.key === today ? " today" : "";
              const netLabel = row.net > 0 ? `+${formatNumber(row.net)}` : formatNumber(row.net);
              const title = row.hasRecord
                ? `${formatFullDateKey(row.key)}：净金币 ${netLabel}，完成 ${row.completed}，失败 ${row.failed}，坏习惯 ${row.badHabits} 次`
                : `${formatFullDateKey(row.key)}：无记录`;
              return `<button class="calendar-day ${level}${todayClass}" type="button" data-day-detail="${escapeAttr(row.key)}" title="${escapeAttr(title)}" aria-label="${escapeAttr(title)}"><span>${row.day}</span></button>`;
            }).join("")}
          </div>
        </div>
      `;
    }

    function trendWidth(rows) {
      if (rows.length <= 7) return 320;
      if (rows.length <= 30) return 620;
      return 1240;
    }

    function renderHabitTrend(rows) {
      const width = trendWidth(rows);
      const height = 168;
      const padX = 14;
      const padY = 18;
      const values = rows.flatMap(row => [row.completed, row.badHabits]);
      const max = Math.max(...values, 0);
      const spread = Math.max(1, max);
      const xStep = rows.length > 1 ? (width - padX * 2) / (rows.length - 1) : 0;
      const yForValue = value => height - padY - (value / spread) * (height - padY * 2);
      const pointsFor = key => rows.map((row, index) => {
        const x = padX + index * xStep;
        const y = yForValue(row[key]);
        return { x, y, row };
      });
      const pathFor = points => points.map((point, index) => `${index ? "L" : "M"} ${point.x.toFixed(1)} ${point.y.toFixed(1)}`).join(" ");
      const completedPoints = pointsFor("completed");
      const badPoints = pointsFor("badHabits");
      const completedPath = pathFor(completedPoints);
      const badPath = pathFor(badPoints);
      const completedStart = completedPoints[0];
      const completedEnd = completedPoints[completedPoints.length - 1];
      const badStart = badPoints[0];
      const badEnd = badPoints[badPoints.length - 1];
      const lastRow = rows[rows.length - 1];
      const zeroY = yForValue(0);
      els.habitTrendChart.innerHTML = `
        <div class="balance-chart" style="--trend-width: ${width}px;">
          <svg class="balance-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="习惯趋势">
            <line class="balance-grid" x1="${padX}" y1="${zeroY.toFixed(1)}" x2="${width - padX}" y2="${zeroY.toFixed(1)}"></line>
            <path class="balance-line good" d="${completedPath}"></path>
            <path class="balance-line bad" d="${badPath}"></path>
            <circle class="balance-point good" cx="${completedStart.x.toFixed(1)}" cy="${completedStart.y.toFixed(1)}" r="4"></circle>
            <circle class="balance-point good" cx="${completedEnd.x.toFixed(1)}" cy="${completedEnd.y.toFixed(1)}" r="4"></circle>
            <circle class="balance-point bad" cx="${badStart.x.toFixed(1)}" cy="${badStart.y.toFixed(1)}" r="4"></circle>
            <circle class="balance-point bad" cx="${badEnd.x.toFixed(1)}" cy="${badEnd.y.toFixed(1)}" r="4"></circle>
          </svg>
          <div class="balance-labels">
            <span>${escapeHtml(rows[0].label)}</span>
            <span>完成 ${formatNumber(rows[0].completed)} → ${formatNumber(lastRow.completed)} · 坏习惯 ${formatNumber(rows[0].badHabits)} → ${formatNumber(lastRow.badHabits)}</span>
            <span>${escapeHtml(lastRow.label)}</span>
          </div>
        </div>
      `;
    }

    function lastDays(count) {
      const days = [];
      const formatter = new Intl.DateTimeFormat("zh-CN", { month: "2-digit", day: "2-digit" });
      for (let index = count - 1; index >= 0; index -= 1) {
        const date = new Date();
        date.setDate(date.getDate() - index);
        days.push({
          key: dateKey(date),
          label: formatter.format(date)
        });
      }
      return days;
    }

    function showCoinFeedback(amount, tone = "negative", sourceEl = null, options = {}) {
      const pulseClass = tone === "positive" ? "coin-pulse-positive" : "coin-pulse-negative";
      [els.homeCoins, els.badCoins, els.rewardCoins, els.statCoins].forEach(target => {
        if (!target) return;
        target.classList.remove("coin-pulse-positive", "coin-pulse-negative");
        void target.offsetWidth;
        target.classList.add(pulseClass);
      });

      if (sourceEl && options.flash !== false) {
        const flashClass = tone === "positive" ? "flash-green" : "flash-red";
        sourceEl.classList.remove("flash-green", "flash-red");
        void sourceEl.offsetWidth;
        sourceEl.classList.add(flashClass);
      }

      const rect = sourceEl ? sourceEl.getBoundingClientRect() : els.homeCoins.getBoundingClientRect();
      const delta = document.createElement("span");
      delta.className = `floating-delta ${tone}`;
      delta.textContent = `${tone === "positive" ? "+" : "-"}${formatNumber(amount)}`;
      delta.style.left = `${rect.left + rect.width / 2}px`;
      delta.style.top = `${rect.top + 14}px`;
      document.body.appendChild(delta);
      delta.addEventListener("animationend", () => delta.remove(), { once: true });
    }

    function closeConfirm(result = false) {
      if (!confirmResolver) return;
      const resolve = confirmResolver;
      confirmResolver = null;
      els.confirmBackdrop.classList.add("hidden");
      els.confirmBackdrop.setAttribute("aria-hidden", "true");
      resolve(result);
    }

    function askForConfirmation({ title, message, confirmText }) {
      if (confirmResolver) closeConfirm(false);
      return new Promise(resolve => {
        confirmResolver = resolve;
        els.confirmTitle.textContent = title;
        els.confirmMessage.textContent = message;
        els.confirmAcceptBtn.textContent = confirmText || "确认";
        els.confirmBackdrop.classList.remove("hidden");
        els.confirmBackdrop.setAttribute("aria-hidden", "false");
        window.setTimeout(() => els.confirmAcceptBtn.focus(), 0);
      });
    }

    function clearPendingUndo(hideToast = false) {
      if (pendingUndo?.timer) {
        clearTimeout(pendingUndo.timer);
      }
      pendingUndo = null;
      els.toast.classList.remove("interactive");
      if (hideToast) {
        els.toast.classList.remove("show");
        els.toast.textContent = "";
      }
    }

    function showUndoToast(undoData) {
      clearPendingUndo(false);
      clearTimeout(showToast.timer);
      pendingUndo = {
        ...undoData,
        timer: window.setTimeout(() => {
          clearPendingUndo(true);
        }, 10000)
      };
      els.toast.innerHTML = `<span>操作已执行</span><span aria-hidden="true">·</span><button type="button" data-undo-action>撤销</button>`;
      els.toast.classList.add("interactive", "show");
    }

    function undoLastAction() {
      if (!pendingUndo) return;
      const undo = pendingUndo;
      clearPendingUndo(true);
      clearTimeout(scheduleRender.timer);

      const historyItem = state.history.find(item => item.id === undo.historyId);
      if (!historyItem) {
        showToast("无法撤销");
        return;
      }

      state.history = state.history.filter(item => item.id !== undo.historyId);
      if (undo.type === "task_failed") {
        if (state.taskResults[undo.date]) {
          delete state.taskResults[undo.date][undo.taskId];
          if (!Object.keys(state.taskResults[undo.date]).length) {
            delete state.taskResults[undo.date];
          }
        }
        state.coins += undo.amount;
        state.totals.coinsPenalty = Math.max(0, parseAmount(state.totals.coinsPenalty) - undo.amount);
      }
      if (undo.type === "bad_habit") {
        state.coins += undo.amount;
        state.totals.coinsPenalty = Math.max(0, parseAmount(state.totals.coinsPenalty) - undo.amount);
      }
      if (undo.type === "reward_redeemed") {
        state.coins += undo.amount;
        state.totals.coinsSpent = Math.max(0, parseAmount(state.totals.coinsSpent) - undo.amount);
      }

      saveState();
      render();
      showToast("已撤销");
    }

    function showToast(message, duration = 1800) {
      clearPendingUndo(false);
      els.toast.textContent = message;
      els.toast.classList.remove("interactive");
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        els.toast.classList.remove("show");
      }, duration);
    }

    function showReviewSavedStatus() {
      els.reviewSaveStatus.classList.add("show");
      clearTimeout(showReviewSavedStatus.timer);
      showReviewSavedStatus.timer = setTimeout(() => {
        els.reviewSaveStatus.classList.remove("show");
      }, 2000);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    document.addEventListener("click", event => {
      const undoButton = event.target.closest("[data-undo-action]");
      const navButton = event.target.closest("[data-nav]");
      const openTaskButton = event.target.closest("[data-open-task]");
      const openHabitButton = event.target.closest("[data-open-habit]");
      const openBadButton = event.target.closest("[data-open-bad]");
      const openNoteButton = event.target.closest("[data-open-note]");
      const openRewardButton = event.target.closest("[data-open-reward]");
      const editTaskButton = event.target.closest("[data-edit-task]");
      const editHabitButton = event.target.closest("[data-edit-habit]");
      const editBadButton = event.target.closest("[data-edit-bad]");
      const editNoteButton = event.target.closest("[data-edit-note]");
      const editRewardButton = event.target.closest("[data-edit-reward]");
      const completeTaskButton = event.target.closest("[data-complete-task]");
      const completeHabitButton = event.target.closest("[data-complete-habit]");
      const failTaskButton = event.target.closest("[data-fail-task]");
      const triggerBadButton = event.target.closest("[data-trigger-bad]");
      const redeemRewardButton = event.target.closest("[data-redeem-reward]");
      const statsRangeButton = event.target.closest("[data-stats-range]");
      const heatMonthButton = event.target.closest("[data-heat-month]");
      const dayDetailButton = event.target.closest("[data-day-detail]");
      const closeButton = event.target.closest("[data-close-sheet]");
      const deleteTaskButton = event.target.closest("[data-delete-task]");
      const deleteHabitButton = event.target.closest("[data-delete-habit]");
      const deleteBadButton = event.target.closest("[data-delete-bad]");
      const deleteNoteButton = event.target.closest("[data-delete-note]");
      const deleteRewardButton = event.target.closest("[data-delete-reward]");

      if (undoButton) {
        undoLastAction();
        return;
      }
      if (navButton) switchView(navButton.dataset.nav);
      if (openTaskButton) openTaskSheet();
      if (openHabitButton) openHabitSheet();
      if (openBadButton) openBadHabitSheet();
      if (openNoteButton) openNoteSheet();
      if (openRewardButton) openRewardSheet();
      if (editTaskButton) openTaskSheet(editTaskButton.dataset.editTask);
      if (editHabitButton) openHabitSheet(editHabitButton.dataset.editHabit);
      if (editBadButton) openBadHabitSheet(editBadButton.dataset.editBad);
      if (editNoteButton) openNoteSheet(editNoteButton.dataset.editNote);
      if (editRewardButton) openRewardSheet(editRewardButton.dataset.editReward);
      if (completeTaskButton) {
        completeTask(completeTaskButton.dataset.completeTask, completeTaskButton.closest("[data-task-card]"));
      }
      if (completeHabitButton) {
        completeHabit(completeHabitButton.dataset.completeHabit, completeHabitButton.closest("[data-habit-card]"));
      }
      if (failTaskButton) {
        failTask(failTaskButton.dataset.failTask, failTaskButton.closest("[data-task-card]"));
      }
      if (triggerBadButton) {
        triggerBadHabit(triggerBadButton.dataset.triggerBad, triggerBadButton.closest("[data-habit-card]"));
      }
      if (redeemRewardButton) {
        redeemReward(
          redeemRewardButton.dataset.redeemReward,
          redeemRewardButton.closest("[data-reward-card]"),
          redeemRewardButton
        );
      }
      if (statsRangeButton) {
        currentStatsRange = statsRangeButton.dataset.statsRange;
        document.querySelectorAll("[data-stats-range]").forEach(button => {
          button.classList.toggle("active", button === statsRangeButton);
        });
        renderHabitTrend(buildStatsRows(currentStatsRange));
      }
      if (heatMonthButton) {
        currentHeatmapMonth = shiftMonthKey(
          currentHeatmapMonth,
          heatMonthButton.dataset.heatMonth === "next" ? 1 : -1
        );
        renderHeatmap();
      }
      if (dayDetailButton) openDayDetail(dayDetailButton.dataset.dayDetail);
      if (closeButton) closeSheet();
      if (deleteTaskButton) deleteTask(deleteTaskButton.dataset.deleteTask);
      if (deleteHabitButton) deleteHabit(deleteHabitButton.dataset.deleteHabit);
      if (deleteBadButton) deleteBadHabit(deleteBadButton.dataset.deleteBad);
      if (deleteNoteButton) deleteNote(deleteNoteButton.dataset.deleteNote);
      if (deleteRewardButton) deleteReward(deleteRewardButton.dataset.deleteReward);
    });

    els.closeSheetBtn.addEventListener("click", closeSheet);
    els.sheetBackdrop.addEventListener("click", event => {
      if (event.target === els.sheetBackdrop) closeSheet();
    });
    els.closeDayDetailBtn.addEventListener("click", closeDayDetail);
    els.dayDetailBackdrop.addEventListener("click", event => {
      if (event.target === els.dayDetailBackdrop) closeDayDetail();
    });
    els.confirmCancelBtn.addEventListener("click", () => closeConfirm(false));
    els.confirmAcceptBtn.addEventListener("click", () => closeConfirm(true));
    els.confirmBackdrop.addEventListener("click", event => {
      if (event.target === els.confirmBackdrop) closeConfirm(false);
    });
    els.sheetForm.addEventListener("submit", handleSheetSubmit);
    els.dailyReviewForm.addEventListener("submit", event => {
      event.preventDefault();
      const formData = new FormData(els.dailyReviewForm);
      saveDailyReview({
        best: formData.get("best"),
        mistake: formData.get("mistake"),
        priority: formData.get("priority")
      });
    });
    els.resetAllBtn.addEventListener("click", () => {
      const confirmed = confirm("确定要重置所有数据吗？此操作会清空当前浏览器中的全部记录。");
      if (confirmed) resetAllData();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        if (!els.confirmBackdrop.classList.contains("hidden")) {
          closeConfirm(false);
          return;
        }
        if (!els.dayDetailBackdrop.classList.contains("hidden")) {
          closeDayDetail();
          return;
        }
        if (!els.sheetBackdrop.classList.contains("hidden")) {
          closeSheet();
        }
      }
    });

    render();
  </script>
</body>
</html>
