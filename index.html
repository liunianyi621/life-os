<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="自律系统">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f6f7f9">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>自律系统</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-soft: #eef1f5;
      --text: #111827;
      --muted: #667085;
      --quiet: #98a2b3;
      --line: #e6e9ee;
      --blue: #0a84ff;
      --green: #34c759;
      --red: #ff3b30;
      --gold: #c88a18;
      --gold-soft: rgba(201, 139, 24, 0.14);
      --glass: rgba(255, 255, 255, 0.76);
      --glass-strong: rgba(255, 255, 255, 0.9);
      --glass-border: rgba(255, 255, 255, 0.72);
      --shadow: 0 12px 32px rgba(17, 24, 39, 0.07);
      --soft-shadow: 0 4px 14px rgba(17, 24, 39, 0.045);
      --card-radius: 24px;
      --control-radius: 16px;
      --small-radius: 14px;
      --pill-radius: 999px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --nav-base-height: 70px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      min-height: 100svh;
      min-height: 100dvh;
      margin: 0;
      background: linear-gradient(180deg, #fbfcfe 0%, var(--bg) 100%);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100svh;
      min-height: 100dvh;
      margin: 0 auto;
      background: transparent;
    }

    .screen {
      min-height: 100svh;
      min-height: 100dvh;
      padding-top: 12px;
      padding-right: max(16px, var(--safe-right));
      padding-bottom: calc(var(--nav-base-height) + 22px + env(safe-area-inset-bottom));
      padding-left: max(16px, var(--safe-left));
    }

    .view {
      display: none;
      animation: viewIn 0.2s ease both;
    }

    .view.active {
      display: block;
    }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      padding: 2px 2px 12px;
    }

    .eyebrow {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 650;
      line-height: 1.2;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 1.78rem;
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2 {
      font-size: 1.08rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    h3 {
      font-size: 1rem;
      line-height: 1.28;
      letter-spacing: 0;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.86);
      color: var(--blue);
      box-shadow: var(--soft-shadow);
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }

    .icon-plus {
      position: relative;
      width: 17px;
      height: 17px;
    }

    .icon-plus::before,
    .icon-plus::after {
      content: "";
      position: absolute;
      inset: 7px 0 auto;
      height: 3px;
      border-radius: 999px;
      background: currentColor;
    }

    .icon-plus::after {
      transform: rotate(90deg);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    /* Soft iOS-style glass surfaces */
    .summary-card,
    .card,
    .stat-card,
    .reset-card {
      border-radius: var(--card-radius);
      border: 1px solid var(--glass-border);
      background: var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
    }

    .summary-card {
      min-height: 104px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .balance-strip {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 16px;
      padding: 13px 15px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.68);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
    }

    .balance-strip span {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .balance-strip strong {
      color: var(--text);
      font-size: 1.42rem;
      line-height: 1;
      font-weight: 850;
    }

    .summary-label,
    .field-label,
    .stat-label {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 680;
    }

    .summary-value,
    .stat-value {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: 10px;
    }

    .summary-value strong,
    .stat-value {
      display: inline-block;
      font-size: 2.05rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .summary-value span {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 740;
    }

    .section-heading {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin: 16px 2px 10px;
    }

    .section-heading span {
      color: var(--quiet);
      font-size: 0.82rem;
      font-weight: 650;
      text-align: right;
    }

    .section-heading-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .section-heading-actions .text-button {
      min-height: 28px;
      padding: 4px 0;
      font-size: 0.82rem;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .card {
      padding: 15px;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .card.flash-red {
      animation: flashRed 0.58s ease both;
    }

    .card.flash-green {
      animation: flashGreen 0.58s ease both;
    }

    .card.task-exit-success {
      animation: taskExitSuccess 0.36s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .card.task-exit-penalty {
      animation: taskExitPenalty 0.36s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .card.habit-completed {
      border-color: rgba(52, 199, 89, 0.2);
      background: rgba(246, 255, 248, 0.82);
    }

    .card.reward-redeemed {
      position: relative;
      overflow: hidden;
      animation: rewardPress 0.46s ease both;
    }

    .card.reward-redeemed::after {
      content: "";
      position: absolute;
      inset: -25% -70%;
      background: linear-gradient(105deg, transparent 36%, rgba(255, 222, 145, 0.54) 48%, transparent 60%);
      transform: translateX(-55%);
      animation: rewardShimmer 0.82s ease-out both;
      pointer-events: none;
    }

    .card-main {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .title-wrap {
      min-width: 0;
    }

    .title-wrap p {
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: var(--pill-radius);
      padding: 5px 10px;
      background: rgba(239, 242, 247, 0.86);
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 720;
    }

    .pill.green {
      background: rgba(52, 199, 89, 0.1);
      color: #248a3d;
    }

    .pill.red {
      background: rgba(255, 59, 48, 0.09);
      color: #d92d20;
    }

    .pill.blue {
      background: rgba(10, 132, 255, 0.09);
      color: var(--blue);
    }

    .coin-pill {
      color: var(--text);
      background: rgba(239, 242, 247, 0.92);
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    .button,
    .ghost-button,
    .danger-button,
    .text-button {
      min-height: 38px;
      border: 0;
      border-radius: var(--control-radius);
      padding: 9px 13px;
      font-size: 0.9rem;
      font-weight: 760;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease, background 0.16s ease;
    }

    .button {
      background: var(--blue);
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(10, 132, 255, 0.18);
    }

    .button.green {
      background: rgba(52, 199, 89, 0.12);
      color: #248a3d;
      box-shadow: none;
    }

    .button.red {
      background: rgba(255, 59, 48, 0.12);
      color: #d92d20;
      box-shadow: none;
    }

    .button.soft-red {
      background: rgba(255, 59, 48, 0.09);
      color: #d92d20;
      box-shadow: none;
    }

    .button[disabled] {
      cursor: default;
      opacity: 0.45;
    }

    .ghost-button {
      background: rgba(237, 242, 247, 0.86);
      color: var(--blue);
    }

    .danger-button {
      background: rgba(255, 59, 48, 0.09);
      color: #d92d20;
    }

    .text-button {
      min-height: 34px;
      padding: 7px 4px;
      background: transparent;
      color: var(--blue);
    }

    .button:active,
    .ghost-button:active,
    .danger-button:active,
    .text-button:active,
    .nav-button:active,
    .icon-button:active {
      transform: scale(0.97);
    }

    .empty-state {
      padding: 22px 18px;
      border-radius: var(--card-radius);
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--muted);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .empty-state strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 1rem;
    }

    .empty-action {
      margin-top: 14px;
    }

    .note-card p {
      white-space: pre-wrap;
    }

    .review-form {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
      padding: 15px;
      border-radius: var(--card-radius);
      border: 1px solid var(--glass-border);
      background: var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
    }

    .review-question {
      display: grid;
      gap: 8px;
    }

    .review-question textarea {
      width: 100%;
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: var(--control-radius);
      padding: 11px 12px;
      background: rgba(249, 250, 251, 0.84);
      color: var(--text);
      line-height: 1.48;
      outline: none;
      resize: vertical;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .review-question textarea:focus {
      border-color: rgba(10, 132, 255, 0.56);
      background: var(--surface);
      box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.12);
    }

    .review-save-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .review-save-status {
      color: #248a3d;
      font-size: 0.86rem;
      font-weight: 800;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .review-save-status.show {
      opacity: 1;
      transform: translateY(0);
    }

    .review-history-list {
      display: grid;
      gap: 10px;
    }

    .review-card {
      display: grid;
      gap: 13px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.82);
    }

    .review-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 11px;
      border-bottom: 1px solid rgba(230, 233, 238, 0.82);
    }

    .review-date {
      display: grid;
      gap: 3px;
    }

    .review-date-label {
      color: var(--quiet);
      font-size: 0.74rem;
      font-weight: 760;
    }

    .review-date-main {
      color: var(--text);
      font-size: 0.96rem;
      font-weight: 840;
    }

    .review-today-pill {
      min-height: 28px;
      border-radius: var(--pill-radius);
      padding: 5px 10px;
      background: rgba(10, 132, 255, 0.09);
      color: var(--blue);
      font-size: 0.78rem;
      font-weight: 820;
    }

    .review-answer {
      display: grid;
      gap: 5px;
    }

    .review-answer strong {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .review-answer p {
      color: var(--text);
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .review-answer.empty p {
      color: var(--quiet);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin: 18px 0 12px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: var(--control-radius);
      background: rgba(236, 240, 245, 0.74);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .segment-button {
      min-height: 34px;
      border: 0;
      border-radius: 13px;
      background: transparent;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 760;
      cursor: pointer;
    }

    .segment-button.active {
      background: var(--glass-strong);
      color: var(--text);
      box-shadow: 0 6px 16px rgba(17, 24, 39, 0.08);
    }

    .chart-card {
      margin-bottom: 12px;
      padding: 16px;
    }

    .chart-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .chart-title span {
      color: var(--quiet);
      font-size: 0.78rem;
      font-weight: 680;
    }

    .chart-scroll {
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
    }

    .month-controls {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 760;
      white-space: nowrap;
    }

    .month-button {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 50%;
      background: rgba(237, 242, 247, 0.9);
      color: var(--blue);
      font-size: 1.15rem;
      font-weight: 820;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease;
    }

    .month-button:active {
      transform: scale(0.95);
    }

    .calendar-heatmap {
      min-width: 320px;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(34px, 1fr));
      gap: 6px;
    }

    .calendar-weekdays {
      margin-bottom: 7px;
      color: var(--quiet);
      font-size: 0.72rem;
      font-weight: 760;
      text-align: center;
    }

    .calendar-day,
    .calendar-empty {
      min-height: 42px;
      border-radius: 12px;
    }

    .calendar-empty {
      background: transparent;
    }

    .calendar-day {
      display: grid;
      align-items: start;
      justify-items: start;
      border: 1px solid rgba(255, 255, 255, 0.82);
      padding: 7px;
      background: #f2f4f7;
      color: var(--muted);
      font: inherit;
      font-size: 0.78rem;
      font-weight: 780;
      text-align: left;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(17, 24, 39, 0.015);
    }

    .calendar-day.today {
      outline: 2px solid rgba(10, 132, 255, 0.42);
      outline-offset: 2px;
    }

    .calendar-day:focus-visible {
      outline: 3px solid rgba(10, 132, 255, 0.34);
      outline-offset: 2px;
    }

    .calendar-day.empty {
      background: rgba(231, 235, 239, 0.5);
      color: var(--quiet);
    }

    .calendar-day.net-0 {
      background: #edf2ef;
      color: #486153;
    }

    .calendar-day.net-1 {
      background: #d9f2df;
      color: #1f6f3a;
    }

    .calendar-day.net-2 {
      background: #91d7a5;
      color: #115b2d;
    }

    .calendar-day.net-3 {
      background: #34c759;
      color: #063f1d;
    }

    .calendar-day.net-4 {
      background: #176c3a;
      color: #ffffff;
    }

    .calendar-day.bad-1 {
      background: #ffd9d6;
      color: #9f1d14;
    }

    .calendar-day.bad-2 {
      background: #f97066;
      color: #ffffff;
    }

    .calendar-day.bad-3 {
      background: #b42318;
      color: #ffffff;
    }

    .heat-legend,
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 680;
    }

    .heat-legend span,
    .chart-legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .heat-legend i,
    .chart-legend i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(152, 162, 179, 0.42);
    }

    .heat-legend i.net-low {
      background: #d9f2df;
    }

    .heat-legend i.net-high {
      background: #176c3a;
    }

    .heat-legend i.bad {
      background: #b42318;
    }

    .heat-legend i.empty {
      background: #e7ebef;
    }

    .chart-legend i.balance {
      background: #d92d20;
    }

    .chart-legend i.good {
      background: #248a3d;
    }

    .chart-legend i.bad {
      background: #d92d20;
    }

    .trend-range {
      margin: 0 0 12px;
    }

    .balance-chart {
      min-width: var(--trend-width, 100%);
    }

    .balance-svg {
      display: block;
      width: 100%;
      min-width: var(--trend-width, 100%);
      height: 168px;
      overflow: visible;
    }

    .balance-grid {
      stroke: rgba(152, 162, 179, 0.22);
      stroke-width: 1;
    }

    .balance-area {
      fill: rgba(255, 59, 48, 0.07);
    }

    .balance-line {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .balance-line.bad {
      stroke: #d92d20;
      filter: drop-shadow(0 5px 8px rgba(255, 59, 48, 0.12));
    }

    .balance-line.good {
      stroke: #248a3d;
      filter: drop-shadow(0 5px 8px rgba(52, 199, 89, 0.12));
    }

    .balance-point {
      fill: #ffffff;
      stroke-width: 2;
    }

    .balance-point.bad {
      stroke: #d92d20;
    }

    .balance-point.good {
      stroke: #248a3d;
    }

    .balance-labels {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      min-width: var(--trend-width, 100%);
      margin-top: 6px;
      color: var(--quiet);
      font-size: 0.68rem;
      font-weight: 700;
    }

    .positive {
      color: #1d8f48;
      font-weight: 760;
    }

    .negative {
      color: var(--red);
      font-weight: 760;
    }

    .stat-card {
      min-height: 108px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .stat-value {
      margin-top: 0;
      display: block;
    }

    .reset-card {
      margin-top: 18px;
      padding: 16px;
    }

    .reset-card p {
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .reset-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
      width: 100%;
      max-width: 480px;
      min-height: calc(var(--nav-base-height) + env(safe-area-inset-bottom));
      margin: 0 auto;
      padding-top: 7px;
      padding-right: max(8px, env(safe-area-inset-right));
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      padding-left: max(8px, env(safe-area-inset-left));
      border-top: 1px solid rgba(255, 255, 255, 0.78);
      background: rgba(250, 251, 253, 0.86);
      box-shadow: 0 -10px 30px rgba(17, 24, 39, 0.06);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
    }

    .nav-button {
      display: grid;
      justify-items: center;
      gap: 4px;
      min-width: 0;
      min-height: 48px;
      border: 0;
      border-radius: 18px;
      padding: 6px 1px 5px;
      background: transparent;
      color: var(--quiet);
      font-size: 0.68rem;
      font-weight: 760;
      cursor: pointer;
      transition: color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }

    .nav-button.active {
      color: var(--blue);
      background: rgba(10, 132, 255, 0.09);
    }

    .nav-icon {
      position: relative;
      display: block;
      width: 22px;
      height: 22px;
      color: currentColor;
    }

    .nav-icon.today::before {
      content: "";
      position: absolute;
      inset: 3px;
      border: 2px solid currentColor;
      border-radius: 50%;
    }

    .nav-icon.today::after {
      content: "";
      position: absolute;
      left: 10px;
      top: 5px;
      width: 2px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 4px 7px 0 currentColor;
    }

    .nav-icon.bad::before {
      content: "";
      position: absolute;
      inset: 4px;
      border: 2px solid currentColor;
      border-radius: 50%;
    }

    .nav-icon.bad::after {
      content: "";
      position: absolute;
      left: 10px;
      top: 6px;
      width: 2px;
      height: 10px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 13px 0 currentColor;
    }

    .nav-icon.notes::before {
      content: "";
      position: absolute;
      inset: 3px 4px;
      border: 2px solid currentColor;
      border-radius: 5px;
    }

    .nav-icon.notes::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 8px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 5px 0 currentColor;
    }

    .nav-icon.review::before {
      content: "";
      position: absolute;
      inset: 3px 5px 3px 4px;
      border: 2px solid currentColor;
      border-radius: 4px;
    }

    .nav-icon.review::after {
      content: "";
      position: absolute;
      left: 8px;
      top: 7px;
      width: 8px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 5px 0 currentColor, -2px 10px 0 currentColor;
    }

    .nav-icon.rewards::before {
      content: "";
      position: absolute;
      inset: 6px 3px 4px;
      border: 2px solid currentColor;
      border-radius: 5px;
    }

    .nav-icon.rewards::after {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      top: 3px;
      height: 6px;
      border: 2px solid currentColor;
      border-bottom: 0;
      border-radius: 7px 7px 0 0;
    }

    .nav-icon.stats::before {
      content: "";
      position: absolute;
      left: 4px;
      bottom: 4px;
      width: 4px;
      height: 8px;
      border-radius: 3px;
      background: currentColor;
      box-shadow: 7px -5px 0 currentColor, 14px -2px 0 currentColor;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      align-items: end;
      justify-items: center;
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
      background: rgba(17, 24, 39, 0.28);
      opacity: 1;
      transition: opacity 0.18s ease;
    }

    .sheet-backdrop.hidden {
      pointer-events: none;
      opacity: 0;
    }

    .sheet {
      width: min(100%, 448px);
      max-height: min(82svh, 680px);
      overflow: auto;
      border-radius: 24px 24px 12px 12px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 60px rgba(17, 24, 39, 0.22);
      transform: translateY(0);
      transition: transform 0.2s ease;
    }

    .sheet-backdrop.hidden .sheet {
      transform: translateY(16px);
    }

    .confirm-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      align-items: end;
      justify-items: center;
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
      background: rgba(17, 24, 39, 0.28);
      opacity: 1;
      transition: opacity 0.18s ease;
    }

    .confirm-backdrop.hidden {
      pointer-events: none;
      opacity: 0;
    }

    .confirm-dialog {
      width: min(100%, 420px);
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 24px 24px 14px 14px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 60px rgba(17, 24, 39, 0.22);
      transform: translateY(0);
      transition: transform 0.2s ease;
    }

    .confirm-backdrop.hidden .confirm-dialog {
      transform: translateY(16px);
    }

    .confirm-dialog p {
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.52;
    }

    .confirm-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 8px;
    }

    .sheet-form {
      display: grid;
      gap: 14px;
      padding: 8px 16px 16px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field input,
    .field textarea {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--control-radius);
      padding: 10px 12px;
      background: #f9fafb;
      color: var(--text);
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.45;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: rgba(10, 132, 255, 0.56);
      background: var(--surface);
      box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.12);
    }

    .time-picker {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(249, 250, 251, 0.82);
    }

    .time-picker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .time-picker-value {
      color: var(--text);
      font-size: 1rem;
      font-weight: 820;
    }

    .time-clear {
      min-height: 30px;
      border: 0;
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(237, 242, 247, 0.92);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 760;
    }

    .time-wheels {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(64px, 0.76fr);
      align-items: center;
      gap: 6px;
      min-height: 164px;
      position: relative;
      padding: 4px 2px;
    }

    .time-wheels::before {
      content: "";
      position: absolute;
      top: 50%;
      right: 0;
      left: 0;
      height: 44px;
      border-radius: 15px;
      background: rgba(235, 239, 245, 0.86);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82), inset 0 -1px 0 rgba(17, 24, 39, 0.04);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .time-wheel {
      position: relative;
      z-index: 1;
      height: 164px;
      overflow-y: auto;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.46);
      mask-image: linear-gradient(180deg, transparent 0%, #000 24%, #000 76%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 24%, #000 76%, transparent 100%);
      overscroll-behavior: contain;
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
      touch-action: pan-y;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .time-wheel::-webkit-scrollbar {
      display: none;
    }

    .time-wheel::before,
    .time-wheel::after {
      content: "";
      display: block;
      height: 60px;
    }

    .time-option {
      display: grid;
      place-items: center;
      width: 100%;
      height: 44px;
      border: 0;
      scroll-snap-align: center;
      background: transparent;
      color: var(--muted);
      font-size: 1.14rem;
      font-weight: 760;
      line-height: 1;
      opacity: 0.54;
      transition: color 0.14s ease, font-size 0.14s ease, font-weight 0.14s ease, opacity 0.14s ease;
    }

    .time-option.selected {
      color: var(--text);
      font-size: 1.32rem;
      font-weight: 880;
      opacity: 1;
    }

    .sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .delete-row {
      padding-top: 4px;
      border-top: 1px solid var(--line);
    }

    .delete-row.hidden {
      display: none;
    }

    .day-detail-content {
      display: grid;
      gap: 12px;
      padding: 8px 16px 18px;
    }

    .detail-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .detail-metric,
    .detail-section {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(249, 250, 251, 0.78);
    }

    .detail-metric {
      min-height: 74px;
      padding: 12px 10px;
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .detail-metric span,
    .detail-section-title {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 760;
    }

    .detail-metric strong {
      color: var(--text);
      font-size: 1.22rem;
      line-height: 1;
      font-weight: 850;
    }

    .detail-metric strong.positive {
      color: #1d8f48;
    }

    .detail-metric strong.negative {
      color: var(--red);
    }

    .detail-section {
      padding: 13px;
    }

    .detail-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .detail-list {
      display: grid;
      gap: 8px;
    }

    .detail-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      color: var(--text);
      font-size: 0.92rem;
      line-height: 1.42;
    }

    .detail-item small {
      display: block;
      margin-top: 3px;
      color: var(--quiet);
      font-size: 0.74rem;
      font-weight: 700;
    }

    .detail-amount {
      flex: 0 0 auto;
      font-weight: 830;
      white-space: nowrap;
    }

    .detail-amount.positive {
      color: #1d8f48;
    }

    .detail-amount.negative {
      color: var(--red);
    }

    .detail-empty {
      color: var(--quiet);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--nav-base-height) + 20px + env(safe-area-inset-bottom));
      z-index: 60;
      width: min(calc(100% - 32px), 420px);
      padding: 12px 14px;
      border-radius: var(--control-radius);
      background: rgba(17, 24, 39, 0.92);
      color: #ffffff;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 720;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .toast.interactive {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      pointer-events: auto;
    }

    .toast button {
      min-height: 28px;
      border: 0;
      border-radius: 999px;
      padding: 4px 9px;
      background: rgba(255, 255, 255, 0.16);
      color: #ffffff;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 840;
      cursor: pointer;
    }

    .floating-delta {
      position: fixed;
      z-index: 70;
      color: var(--red);
      font-weight: 850;
      pointer-events: none;
      animation: floatDelta 0.9s ease-out forwards;
    }

    .floating-delta.positive {
      color: #248a3d;
    }

    .floating-delta.negative {
      color: #d92d20;
    }

    .coin-pulse-positive {
      animation: coinPulsePositive 0.56s ease both;
    }

    .coin-pulse-negative {
      animation: coinPulseNegative 0.56s ease both;
    }

    .coin-pulse-gold {
      animation: coinGoldGlow 0.72s ease both;
    }

    .reward-button-spend {
      animation: rewardButtonPress 0.42s ease both;
    }

    .floating-reward-message {
      position: fixed;
      z-index: 70;
      padding: 8px 11px;
      border-radius: 999px;
      border: 1px solid rgba(201, 139, 24, 0.22);
      background: rgba(255, 250, 235, 0.92);
      color: #8a5a00;
      font-size: 0.78rem;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(201, 139, 24, 0.14);
      pointer-events: none;
      animation: rewardMessageFloat 1.08s ease-out forwards;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    @media (min-width: 760px) {
      body {
        padding: 28px 0;
      }

      .app {
        min-height: calc(100svh - 56px);
        min-height: calc(100dvh - 56px);
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 24px 70px rgba(17, 24, 39, 0.12);
      }

      .screen {
        min-height: calc(100svh - 56px);
        min-height: calc(100dvh - 56px);
      }
    }

    @media (max-width: 390px) {
      .screen {
        padding-top: 10px;
        padding-right: max(12px, var(--safe-right));
        padding-left: max(12px, var(--safe-left));
      }

      .summary-card {
        min-height: 104px;
        padding: 14px;
      }

      .summary-value strong,
      .stat-value {
        font-size: 1.86rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }

    @keyframes viewIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes flashRed {
      0% {
        transform: scale(1);
        background: var(--glass);
      }
      45% {
        transform: scale(0.992);
        background: rgba(255, 59, 48, 0.1);
      }
      100% {
        transform: scale(1);
        background: var(--glass);
      }
    }

    @keyframes flashGreen {
      0% {
        transform: scale(1);
        background: var(--glass);
      }
      45% {
        transform: scale(0.992);
        background: rgba(52, 199, 89, 0.1);
      }
      100% {
        transform: scale(1);
        background: var(--glass);
      }
    }

    @keyframes rewardPress {
      0%,
      100% {
        transform: scale(1);
      }
      42% {
        transform: scale(0.985);
        border-color: rgba(201, 139, 24, 0.24);
        background: rgba(255, 250, 235, 0.8);
      }
    }

    @keyframes rewardShimmer {
      from {
        transform: translateX(-55%);
      }
      to {
        transform: translateX(55%);
      }
    }

    @keyframes rewardButtonPress {
      0%,
      100% {
        transform: scale(1);
      }
      45% {
        transform: scale(0.94);
        background: var(--gold);
        box-shadow: 0 8px 18px rgba(201, 139, 24, 0.2);
      }
    }

    @keyframes coinGoldGlow {
      0%,
      100% {
        transform: scale(1);
        color: var(--text);
      }
      45% {
        transform: scale(1.025);
        color: #8a5a00;
      }
    }

    @keyframes rewardMessageFloat {
      from {
        opacity: 0;
        transform: translate(-50%, 8px) scale(0.98);
      }
      18% {
        opacity: 1;
      }
      72% {
        opacity: 1;
      }
      to {
        opacity: 0;
        transform: translate(-50%, -30px) scale(1);
      }
    }

    @keyframes taskExitSuccess {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      42% {
        opacity: 1;
        transform: translateY(-2px) scale(0.99);
        background: rgba(52, 199, 89, 0.1);
      }
      100% {
        opacity: 0;
        transform: translateY(-12px) scale(0.975);
      }
    }

    @keyframes taskExitPenalty {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      42% {
        opacity: 1;
        transform: translateY(1px) scale(0.99);
        background: rgba(255, 59, 48, 0.1);
      }
      100% {
        opacity: 0;
        transform: translateY(12px) scale(0.975);
      }
    }

    @keyframes coinPulsePositive {
      0%,
      100% {
        transform: scale(1);
      }
      45% {
        transform: scale(1.035);
        color: #248a3d;
      }
    }

    @keyframes coinPulseNegative {
      0%,
      100% {
        transform: translateX(0) scale(1);
      }
      25% {
        transform: translateX(-2px) scale(1.02);
      }
      50% {
        transform: translateX(2px) scale(1.02);
      }
      75% {
        transform: translateX(-1px) scale(1.01);
      }
    }

    @keyframes floatDelta {
      from {
        opacity: 0;
        transform: translate(-50%, 8px);
      }
      18% {
        opacity: 1;
      }
      to {
        opacity: 0;
        transform: translate(-50%, -34px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="screen">
      <section class="view active" data-view="today">
        <header class="header">
          <div>
            <span class="eyebrow" id="todayDate">今天</span>
            <h1>自律系统</h1>
          </div>
          <button class="icon-button" data-open-task aria-label="新建任务">
            <span class="icon-plus" aria-hidden="true"></span>
          </button>
        </header>

        <section class="summary-grid" aria-label="今日概览">
          <div class="summary-card">
            <span class="summary-label">当前金币</span>
            <div class="summary-value">
              <strong id="homeCoins">0</strong>
              <span>金币</span>
            </div>
          </div>
          <div class="summary-card">
            <span class="summary-label">当前连续</span>
            <div class="summary-value">
              <strong id="homeStreak">0</strong>
              <span>天</span>
            </div>
          </div>
        </section>

        <div class="section-heading">
          <h2>习惯</h2>
          <div class="section-heading-actions">
            <span id="habitCount">0 项</span>
            <button class="text-button" type="button" data-open-habit>新建</button>
          </div>
        </div>
        <div class="list" id="habitList"></div>

        <div class="section-heading">
          <h2>今日任务</h2>
          <span id="todayTaskCount">0 项</span>
        </div>
        <div class="list" id="todayTaskList"></div>
      </section>

      <section class="view" data-view="bad">
        <header class="header">
          <div>
            <span class="eyebrow">点击即扣金币</span>
            <h1>坏习惯</h1>
          </div>
          <button class="icon-button" data-open-bad aria-label="新建坏习惯">
            <span class="icon-plus" aria-hidden="true"></span>
          </button>
        </header>

        <section class="balance-strip" aria-label="当前金币">
          <span>当前金币</span>
          <strong id="badCoins">0</strong>
          <span>金币</span>
        </section>

        <div class="section-heading">
          <h2>坏习惯</h2>
          <span id="badHabitCount">0 项</span>
        </div>
        <div class="list" id="badHabitList"></div>
      </section>

      <section class="view" data-view="notes">
        <header class="header">
          <div>
            <span class="eyebrow">简单提醒</span>
            <h1>笔记</h1>
          </div>
          <button class="icon-button" data-open-note aria-label="新建笔记">
            <span class="icon-plus" aria-hidden="true"></span>
          </button>
        </header>

        <div class="section-heading">
          <h2>笔记</h2>
          <span id="noteCount">0 条</span>
        </div>
        <div class="list" id="noteList"></div>
      </section>

      <section class="view" data-view="review">
        <header class="header">
          <div>
            <span class="eyebrow" id="reviewDate">今天</span>
            <h1>每日复盘</h1>
          </div>
        </header>

        <form class="review-form" id="dailyReviewForm">
          <label class="review-question">
            <span class="field-label">今天做得最好的事情是什么？</span>
            <textarea id="reviewBest" name="best" maxlength="500" placeholder="写下今天最值得保留的一件事"></textarea>
          </label>
          <label class="review-question">
            <span class="field-label">今天最大的失误是什么？</span>
            <textarea id="reviewMistake" name="mistake" maxlength="500" placeholder="写下今天最需要修正的地方"></textarea>
          </label>
          <label class="review-question">
            <span class="field-label">明天最重要的一件事是什么？</span>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "minimal-discipline-v1";
    const OLD_STORAGE_KEYS = [
      "life-rpg-system-v1",
      "life-os-ios-v1",
      "life-streak-os-v1"
    ];

    const emptyState = {
      coins: 0,
      streak: 0,
      lastCompletedDate: null,
      settledThroughDate: null,
      tasks: [],
      completions: {},
      taskResults: {},
      habits: [],
      habitCompletions: {},
      badHabits: [],
      notes: [],
      rewards: [],
      dailyReviews: {},
      history: [],
      totals: {
        completedTasks: 0,
        coinsSpent: 0,
        coinsPenalty: 0
      }
    };

    let state = loadState();
    let sheetMode = null;
    let editingId = null;
    let currentStatsRange = "week";
    let currentHeatmapMonth = monthKey();
    let pendingUndo = null;
    let confirmResolver = null;

    const els = {
      todayDate: document.getElementById("todayDate"),
      homeCoins: document.getElementById("homeCoins"),
      homeStreak: document.getElementById("homeStreak"),
      habitCount: document.getElementById("habitCount"),
      habitList: document.getElementById("habitList"),
      todayTaskCount: document.getElementById("todayTaskCount"),
      todayTaskList: document.getElementById("todayTaskList"),
      badCoins: document.getElementById("badCoins"),
      badHabitCount: document.getElementById("badHabitCount"),
      badHabitList: document.getElementById("badHabitList"),
      noteCount: document.getElementById("noteCount"),
      noteList: document.getElementById("noteList"),
      reviewDate: document.getElementById("reviewDate"),
      dailyReviewForm: document.getElementById("dailyReviewForm"),
      reviewBest: document.getElementById("reviewBest"),
      reviewMistake: document.getElementById("reviewMistake"),
      reviewPriority: document.getElementById("reviewPriority"),
      reviewSaveStatus: document.getElementById("reviewSaveStatus"),
      reviewHistoryCount: document.getElementById("reviewHistoryCount"),
      reviewHistoryList: document.getElementById("reviewHistoryList"),
      rewardCoins: document.getElementById("rewardCoins"),
      rewardCount: document.getElementById("rewardCount"),
      rewardList: document.getElementById("rewardList"),
      statStreak: document.getElementById("statStreak"),
      statCompleted: document.getElementById("statCompleted"),
      statCoins: document.getElementById("statCoins"),
      statSpent: document.getElementById("statSpent"),
      statPenalty: document.getElementById("statPenalty"),
      heatmapMonthLabel: document.getElementById("heatmapMonthLabel"),
      heatmapChart: document.getElementById("heatmapChart"),
      habitTrendChart: document.getElementById("habitTrendChart"),
      resetAllBtn: document.getElementById("resetAllBtn"),
      sheetBackdrop: document.getElementById("sheetBackdrop"),
      sheetTitle: document.getElementById("sheetTitle"),
      sheetForm: document.getElementById("sheetForm"),
      closeSheetBtn: document.getElementById("closeSheetBtn"),
      dayDetailBackdrop: document.getElementById("dayDetailBackdrop"),
      dayDetailTitle: document.getElementById("dayDetailTitle"),
      dayDetailContent: document.getElementById("dayDetailContent"),
      closeDayDetailBtn: document.getElementById("closeDayDetailBtn"),
      confirmBackdrop: document.getElementById("confirmBackdrop"),
      confirmTitle: document.getElementById("confirmTitle"),
      confirmMessage: document.getElementById("confirmMessage"),
      confirmCancelBtn: document.getElementById("confirmCancelBtn"),
      confirmAcceptBtn: document.getElementById("confirmAcceptBtn"),
      toast: document.getElementById("toast")
    };

    function cloneEmptyState() {
      return JSON.parse(JSON.stringify(emptyState));
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        const merged = saved ? {
          ...cloneEmptyState(),
          ...saved,
          totals: { ...cloneEmptyState().totals, ...(saved.totals || {}) },
          tasks: Array.isArray(saved.tasks) ? saved.tasks : [],
          habits: Array.isArray(saved.habits) ? saved.habits : [],
          badHabits: Array.isArray(saved.badHabits) ? saved.badHabits : [],
          notes: Array.isArray(saved.notes) ? saved.notes : [],
          rewards: Array.isArray(saved.rewards) ? saved.rewards : [],
          dailyReviews: saved.dailyReviews && typeof saved.dailyReviews === "object" ? saved.dailyReviews : {},
          history: Array.isArray(saved.history) ? saved.history : [],
          completions: saved.completions && typeof saved.completions === "object" ? saved.completions : {},
          taskResults: saved.taskResults && typeof saved.taskResults === "object" ? saved.taskResults : {},
          habitCompletions: saved.habitCompletions && typeof saved.habitCompletions === "object" ? saved.habitCompletions : {}
        } : cloneEmptyState();

        if (!Object.keys(merged.taskResults).length && Object.keys(merged.completions).length) {
          Object.entries(merged.completions).forEach(([day, tasks]) => {
            merged.taskResults[day] = merged.taskResults[day] || {};
            Object.keys(tasks || {}).forEach(taskId => {
              merged.taskResults[day][taskId] = "completed";
            });
          });
        }

        if (!merged.settledThroughDate) {
          merged.settledThroughDate = yesterdayKey();
        }

        return merged;
      } catch {
        const fresh = cloneEmptyState();
        fresh.settledThroughDate = yesterdayKey();
        return fresh;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function dateKey(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function monthKey(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${year}-${month}`;
    }

    function dateFromKey(key) {
      const [year, month, day] = String(key || "").split("-").map(Number);
      return new Date(year || 1970, (month || 1) - 1, day || 1);
    }

    function monthDateFromKey(key) {
      const [year, month] = String(key || monthKey()).split("-").map(Number);
      return new Date(year || new Date().getFullYear(), (month || 1) - 1, 1);
    }

    function shiftMonthKey(key, offset) {
      const date = monthDateFromKey(key);
      date.setMonth(date.getMonth() + offset);
      return monthKey(date);
    }

    function yesterdayKey() {
      const date = new Date();
      date.setDate(date.getDate() - 1);
      return dateKey(date);
    }

    function formatDate(date = new Date()) {
      return new Intl.DateTimeFormat("zh-CN", {
        month: "long",
        day: "numeric",
        weekday: "long"
      }).format(date);
    }

    function formatMonth(key) {
      return new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "long"
      }).format(monthDateFromKey(key));
    }

    function formatFullDateKey(key) {
      return new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      }).format(dateFromKey(key));
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("zh-CN").format(Number(value) || 0);
    }

    function createId(prefix) {
      return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function parseAmount(value) {
      const amount = Number(value);
      if (!Number.isFinite(amount) || amount < 0) return 0;
      return Math.round(amount);
    }

    function currentStreak() {
      if (!state.lastCompletedDate) return 0;
      const today = dateKey();
      if (state.lastCompletedDate === today || state.lastCompletedDate === yesterdayKey()) {
        return state.streak;
      }
      return 0;
    }

    function taskResultOnDate(taskId, day) {
      return state.taskResults[day]?.[taskId] || null;
    }

    function taskResultToday(taskId) {
      return taskResultOnDate(taskId, dateKey());
    }

    function taskDate(task) {
      if (task.date) return task.date;
      if (task.createdDate) return task.createdDate;
      if (task.createdAt) return String(task.createdAt).slice(0, 10);
      return "";
    }

    function resetAllData() {
      localStorage.removeItem(STORAGE_KEY);
      OLD_STORAGE_KEYS.forEach(key => localStorage.removeItem(key));
      state = cloneEmptyState();
      state.settledThroughDate = yesterdayKey();
      saveState();
      render();
      showToast("所有数据已重置");
    }

    function parseTimeValue(value) {
      const raw = String(value || "").trim();
      const twelveHour = raw.match(/^(\d{1,2}):([0-5]\d)\s*([AP]M)$/i);
      if (twelveHour) {
        const hour = Number(twelveHour[1]);
        if (hour >= 1 && hour <= 12) {
          return {
            hour: String(hour),
            minute: twelveHour[2],
            period: twelveHour[3].toUpperCase()
          };
        }
      }

      const twentyFourHour = raw.match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
      if (twentyFourHour) {
        return timePartsFrom24Hour(Number(twentyFourHour[1]), twentyFourHour[2]);
      }

      return null;
    }

    function timePartsFrom24Hour(hour24, minute = "00") {
      const normalizedHour = ((Number(hour24) % 24) + 24) % 24;
      const hour = normalizedHour % 12 || 12;
      return {
        hour: String(hour),
        minute: String(minute).padStart(2, "0"),
        period: normalizedHour >= 12 ? "PM" : "AM"
      };
    }

    function nextWholeHourTime() {
      const now = new Date();
      return timePartsFrom24Hour(now.getHours() + 1, "00");
    }

    function formatTimeParts(parts) {
      if (!parts) return "";
      const hour = Number(parts.hour);
      const minute = String(parts.minute || "00").padStart(2, "0");
      const period = parts.period === "PM" ? "PM" : "AM";
      return `${hour || 12}:${minute} ${period}`;
    }

    function timeOptionButtons(type, selected) {
      const values = {
        hour: Array.from({ length: 12 }, (_, index) => String(index + 1)),
        minute: Array.from({ length: 60 }, (_, index) => String(index).padStart(2, "0")),
        period: ["AM", "PM"]
      }[type] || [];
      const selectedValue = selected == null ? "" : String(selected);
      return values.map(value => {
        const selectedClass = value === selectedValue ? " selected" : "";
        return `<button class="time-option${selectedClass}" type="button" data-time-${type}="${value}">${value}</button>`;
      }).join("");
    }

    function initTimePicker(initialValue = "") {
      const picker = els.sheetForm.querySelector("[data-time-picker]");
      if (!picker) return;

      const hiddenInput = picker.querySelector("input[name='time']");
      const valueLabel = picker.querySelector("[data-time-value]");
      const hourWheel = picker.querySelector("[data-time-wheel='hour']");
      const minuteWheel = picker.querySelector("[data-time-wheel='minute']");
      const periodWheel = picker.querySelector("[data-time-wheel='period']");
      const initial = parseTimeValue(initialValue);
      let userWheelIntent = false;

      function datasetKey(type) {
        return `time${type.charAt(0).toUpperCase()}${type.slice(1)}`;
      }

      function selectedValueFor(type, parts) {
        if (type === "hour") return parts.hour;
        if (type === "minute") return parts.minute;
        return parts.period;
      }

      function vibrateTimeChange() {
        try {
          if (navigator.vibrate) navigator.vibrate(10);
        } catch (error) {
          // Haptics are a best-effort touch nicety.
        }
      }

      function currentTimeParts() {
        return parseTimeValue(hiddenInput.value) || nextWholeHourTime();
      }

      function findWheelOption(wheel, type, value) {
        return Array.from(wheel.querySelectorAll(".time-option")).find(option => (
          option.dataset[datasetKey(type)] === String(value)
        ));
      }

      function scrollWheelTo(type, value, behavior = "smooth") {
        const wheel = picker.querySelector(`[data-time-wheel='${type}']`);
        if (!wheel) return;
        findWheelOption(wheel, type, value)?.scrollIntoView({ block: "center", behavior });
      }

      function setTime(parts, options = {}) {
        const nextParts = {
          hour: String(Number(parts.hour) || 12),
          minute: String(parts.minute || "00").padStart(2, "0"),
          period: parts.period === "PM" ? "PM" : "AM"
        };
        const previousValue = hiddenInput.value;
        const nextValue = formatTimeParts(nextParts);
        picker.dataset.hour = nextParts.hour;
        picker.dataset.minute = nextParts.minute;
        picker.dataset.period = nextParts.period;
        delete picker.dataset.timeCleared;
        hiddenInput.value = nextValue;
        valueLabel.textContent = nextValue;
        picker.querySelectorAll(".time-option").forEach(option => {
          const type = option.closest("[data-time-wheel]")?.dataset.timeWheel;
          option.classList.toggle("selected", Boolean(type) && option.dataset[datasetKey(type)] === selectedValueFor(type, nextParts));
        });
        if (options.vibrate && previousValue !== nextValue) vibrateTimeChange();
      }

      function clearTime() {
        delete picker.dataset.hour;
        delete picker.dataset.minute;
        delete picker.dataset.period;
        picker.dataset.timeCleared = "true";
        userWheelIntent = false;
        hiddenInput.value = "";
        valueLabel.textContent = "未设置";
        picker.querySelectorAll(".time-option").forEach(option => option.classList.remove("selected"));
      }

      if (initial) {
        setTime(initial);
        requestAnimationFrame(() => {
          scrollWheelTo("hour", initial.hour, "auto");
          scrollWheelTo("minute", initial.minute, "auto");
          scrollWheelTo("period", initial.period, "auto");
        });
      } else {
        clearTime();
      }

      picker.addEventListener("click", event => {
        const hourButton = event.target.closest("[data-time-hour]");
        const minuteButton = event.target.closest("[data-time-minute]");
        const periodButton = event.target.closest("[data-time-period]");
        const clearButton = event.target.closest("[data-clear-time]");

        if (clearButton) {
          clearTime();
          return;
        }

        if (hourButton || minuteButton || periodButton) {
          const next = currentTimeParts();
          if (hourButton) next.hour = hourButton.dataset.timeHour;
          if (minuteButton) next.minute = minuteButton.dataset.timeMinute;
          if (periodButton) next.period = periodButton.dataset.timePeriod;
          setTime(next, { vibrate: true });
          if (hourButton) scrollWheelTo("hour", next.hour);
          if (minuteButton) scrollWheelTo("minute", next.minute);
          if (periodButton) scrollWheelTo("period", next.period);
        }
      });

      function attachWheelScroll(wheel, type) {
        if (!wheel) return;
        let scrollTimer;
        const markUserWheelIntent = () => {
          userWheelIntent = true;
        };
        const settleWheel = () => {
          if (!hiddenInput.value && picker.dataset.timeCleared === "true" && !userWheelIntent) return;
          const wheelRect = wheel.getBoundingClientRect();
          const center = wheelRect.top + wheelRect.height / 2;
          const options = Array.from(wheel.querySelectorAll(".time-option"));
          const nearest = options.reduce((closest, option) => {
            const rect = option.getBoundingClientRect();
            const distance = Math.abs(rect.top + rect.height / 2 - center);
            return !closest || distance < closest.distance ? { option, distance } : closest;
          }, null)?.option;
          if (!nearest) return;
          const next = currentTimeParts();
          next[type] = nearest.dataset[datasetKey(type)];
          setTime(next, { vibrate: true });
          userWheelIntent = false;
        };

        wheel.addEventListener("pointerdown", markUserWheelIntent, { passive: true });
        wheel.addEventListener("touchstart", markUserWheelIntent, { passive: true });
        wheel.addEventListener("wheel", markUserWheelIntent, { passive: true });
        wheel.addEventListener("scroll", () => {
          clearTimeout(scrollTimer);
          scrollTimer = setTimeout(settleWheel, 90);
        }, { passive: true });
        wheel.addEventListener("scrollend", settleWheel, { passive: true });
      }

      attachWheelScroll(hourWheel, "hour");
      attachWheelScroll(minuteWheel, "minute");
      attachWheelScroll(periodWheel, "period");
    }

    function openTaskSheet(taskId = null) {
      sheetMode = "task";
      editingId = taskId;
      const task = taskId ? state.tasks.find(item => item.id === taskId) : null;
      const parsedTaskTime = parseTimeValue(task?.time);
      const taskTime = task ? parsedTaskTime : nextWholeHourTime();
      const initialTimeValue = taskTime ? formatTimeParts(taskTime) : "";
      els.sheetTitle.textContent = task ? "编辑任务" : "新建任务";
      els.sheetForm.innerHTML = `
        <label class="field">
          <span class="field-label">任务名称</span>
          <input name="name" type="text" maxlength="80" value="${escapeAttr(task?.name || "")}" placeholder="输入任务名称" required>
        </label>
        <label class="field">
          <span class="field-label">金币金额</span>
          <input name="coins" type="number" min="0" step="1" inputmode="numeric" value="${task?.coins ?? ""}" placeholder="0">
        </label>
        <div class="field">
          <span class="field-label">时间（可选）</span>
          <div class="time-picker" data-time-picker>
            <input name="time" type="hidden" value="${escapeAttr(initialTimeValue)}">
            <div class="time-picker-header">
              <span class="time-picker-value" data-time-value>${escapeHtml(initialTimeValue || "未设置")}</span>
              <button class="time-clear" type="button" data-clear-time>不设置</button>
            </div>
            <div class="time-wheels" aria-label="选择时间">
              <div class="time-wheel" data-time-wheel="hour" aria-label="小时">
                ${timeOptionButtons("hour", taskTime?.hour)}
              </div>
              <div class="time-wheel" data-time-wheel="minute" aria-label="分钟">
                ${timeOptionButtons("minute", taskTime?.minute)}
              </div>
              <div class="time-wheel" data-time-wheel="period" aria-label="上午或下午">
                ${timeOptionButtons("period", taskTime?.period)}
              </div>
            </div>
          </div>
        </div>

      if (!taskData.name) {
        showToast("请输入任务名称");

      if (editingId) {
        state.tasks = state.tasks.map(task => (
          task.id === editingId
            ? { ...task, ...taskData, updatedAt: new Date().toISOString() }
            : task
        ));
        showToast("任务已更新");
      } else {
        const today = dateKey();
        state.tasks.push({
          id: createId("task"),
          ...taskData,
          date: today,
          createdDate: today,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()

      saveState();
      closeSheet();

    function dailyReviewToday() {
      return state.dailyReviews[dateKey()] || {
        best: "",
        mistake: "",
        priority: ""
      };
    }

    function sortedDailyReviews(includeToday = true) {
      const today = dateKey();
      return Object.entries(state.dailyReviews || {})
        .filter(([day, review]) => {
          if (!includeToday && day === today) return false;
          return review && typeof review === "object";
        })
        .sort(([left], [right]) => right.localeCompare(left));
    }

    function saveDailyReview(reviewData) {
      const today = dateKey();
      const best = String(reviewData.best || "").trim();
      const mistake = String(reviewData.mistake || "").trim();
      const priority = String(reviewData.priority || "").trim();

      if (!best && !mistake && !priority) {
        showToast("至少填写一项复盘");
        return;
      }

      const previous = state.dailyReviews[today] || {};
      state.dailyReviews[today] = {
        date: today,
        best,
        mistake,
        priority,
        createdAt: previous.createdAt || new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      saveState();
      renderDailyReview({ clearInputs: true });
      showReviewSavedStatus();
      showToast("✓ 已保存", 2000);
    }

    function todayTasks() {
      const today = dateKey();
      return state.tasks.filter(task => taskDate(task) === today);
    }

    function activeTasksToday() {
      return todayTasks().filter(task => !taskResultToday(task.id));
    }

    function habitCompletedOnDate(habitId, day) {
      return Boolean(state.habitCompletions?.[day]?.[habitId]);
    }

    function habitCompletedToday(habitId) {
      return habitCompletedOnDate(habitId, dateKey());
    }

    function summaryTotals() {
      if (!state.history.length) {
        return {
          completedTasks: state.totals.completedTasks || 0,
          coinsSpent: state.totals.coinsSpent || 0,
          coinsPenalty: state.totals.coinsPenalty || 0
        };
      }

      return state.history.reduce((totals, item) => {
        if (item.type === "task_completed" || item.type === "habit_completed") {
          totals.completedTasks += 1;
        }
        if (item.type === "reward_redeemed") {
          totals.coinsSpent += parseAmount(item.cost);
        }
        if (item.type === "task_failed" || item.type === "task_missed" || item.type === "bad_habit") {
          totals.coinsPenalty += parseAmount(item.coins);
        }
        return totals;
      }, {
        completedTasks: 0,
        coinsSpent: 0,
        coinsPenalty: 0
      });
    }

    function setCoinReadouts(value) {
      const formatted = formatNumber(value);
      [els.homeCoins, els.badCoins, els.rewardCoins, els.statCoins].forEach(target => {
        if (target) target.textContent = formatted;
      });
    }

    function animateCoinBalance(from, to, duration = 720) {
      const targets = [els.homeCoins, els.badCoins, els.rewardCoins, els.statCoins].filter(Boolean);
      targets.forEach(target => {
        target.classList.remove("coin-pulse-positive", "coin-pulse-negative", "coin-pulse-gold");
        void target.offsetWidth;
        target.classList.add("coin-pulse-gold");
      });

      const now = window.performance?.now ? () => window.performance.now() : () => Date.now();
      const frame = window.requestAnimationFrame
        ? callback => window.requestAnimationFrame(callback)
        : callback => setTimeout(() => callback(now()), 16);
      const start = now();
      const change = to - from;
      const tick = timestamp => {
        const progress = Math.min(1, (timestamp - start) / duration);
        const eased = 1 - Math.pow(1 - progress, 3);
        setCoinReadouts(Math.round(from + change * eased));
        if (progress < 1) frame(tick);
        else setCoinReadouts(to);
      };
      frame(tick);
    }

    function updatePrimaryReadouts() {
      const streak = currentStreak();
      const activeCount = activeTasksToday().length;
      const totals = summaryTotals();
      setCoinReadouts(state.coins);
      els.homeStreak.textContent = formatNumber(streak);
      els.todayTaskCount.textContent = `${activeCount} 项`;
      if (els.statStreak) els.statStreak.textContent = formatNumber(streak);
      if (els.statCompleted) els.statCompleted.textContent = formatNumber(totals.completedTasks);
      if (els.statCoins) els.statCoins.textContent = formatNumber(state.coins);
      if (els.statSpent) els.statSpent.textContent = formatNumber(totals.coinsSpent);
      if (els.statPenalty) els.statPenalty.textContent = formatNumber(totals.coinsPenalty);
    }

    function scheduleRender(delay = 320) {
      clearTimeout(scheduleRender.timer);
      scheduleRender.timer = setTimeout(render, delay);
    }

    function prepareActionCard(card) {
      if (!card) return;
      card.querySelectorAll("button").forEach(button => {
        button.disabled = true;
      });
    }

    function completeTask(taskId, sourceEl = null) {
      const task = todayTasks().find(item => item.id === taskId);
      if (!task || taskResultToday(taskId)) return;

      const today = dateKey();
      const amount = parseAmount(task.coins);
      state.completions[today] = state.completions[today] || {};
      state.completions[today][taskId] = true;
      state.taskResults[today] = state.taskResults[today] || {};
      state.taskResults[today][taskId] = "completed";
      state.coins += amount;
      state.totals.completedTasks += 1;
      updateStreakForCompletion(today);
      state.history.unshift({
        id: createId("history"),
        type: "task_completed",
        taskId: task.id,
        name: task.name,
        coins: amount,
        date: today,
        timestamp: new Date().toISOString()
      });
      saveState();
      updatePrimaryReadouts();
      prepareActionCard(sourceEl);
      if (sourceEl) sourceEl.classList.add("task-exit-success");
      showCoinFeedback(amount, "positive", sourceEl, { flash: false });
      scheduleRender(sourceEl ? 380 : 0);
      showToast("任务已完成");
    }

    function completeHabit(habitId, sourceEl = null) {
      const habit = state.habits.find(item => item.id === habitId);
      if (!habit || habitCompletedToday(habitId)) return;

      const today = dateKey();
      const amount = parseAmount(habit.coins);
      state.habitCompletions[today] = state.habitCompletions[today] || {};
      state.habitCompletions[today][habitId] = true;
      state.coins += amount;
      updateStreakForCompletion(today);
      state.history.unshift({
        id: createId("history"),
        type: "habit_completed",
        habitId: habit.id,
        name: habit.name,
        coins: amount,
        date: today,
        timestamp: new Date().toISOString()
      });
      saveState();
      updatePrimaryReadouts();
      prepareActionCard(sourceEl);
      if (sourceEl) sourceEl.classList.add("task-exit-success");
      showCoinFeedback(amount, "positive", sourceEl, { flash: false });
      scheduleRender(sourceEl ? 380 : 0);
      showToast("习惯已完成");
    }

    async function failTask(taskId, sourceEl = null) {
      const task = todayTasks().find(item => item.id === taskId);
      if (!task || taskResultToday(taskId)) return;

      const today = dateKey();
      const amount = parseAmount(task.coins) * 5;
      const confirmed = await askForConfirmation({
        title: "确认任务失败",
        message: `将扣除 ${formatNumber(amount)} 金币。确认把「${task.name}」判定为失败吗？`,
        confirmText: "确认失败"
      });
      if (!confirmed || taskResultToday(taskId)) return;

      state.taskResults[today] = state.taskResults[today] || {};
      state.taskResults[today][taskId] = "failed";
      state.coins -= amount;
      state.totals.coinsPenalty += amount;
      const historyId = createId("history");
      state.history.unshift({
        id: historyId,
        type: "task_failed",
        taskId: task.id,
        name: task.name,
        coins: amount,
        date: today,
        timestamp: new Date().toISOString()
      });
      saveState();
      updatePrimaryReadouts();
      prepareActionCard(sourceEl);
      if (sourceEl) sourceEl.classList.add("task-exit-penalty");
      showCoinFeedback(amount, "negative", sourceEl, { flash: false });
      scheduleRender(sourceEl ? 380 : 0);
      showUndoToast({
        type: "task_failed",
        historyId,
        taskId: task.id,
        date: today,
        amount
      });
    }

    function updateStreakForCompletion(today) {
      if (state.lastCompletedDate === today) return;
      state.streak = state.lastCompletedDate === yesterdayKey() ? state.streak + 1 : 1;
      state.lastCompletedDate = today;
    }

    async function triggerBadHabit(habitId, sourceEl = null) {
      const habit = state.badHabits.find(item => item.id === habitId);
      if (!habit) return;
      const amount = parseAmount(habit.penalty);
      const confirmed = await askForConfirmation({
        title: "确认记录坏习惯",
        message: `将扣除 ${formatNumber(amount)} 金币。确认记录「${habit.name}」吗？`,
        confirmText: "确认扣除"
      });
      if (!confirmed || !state.badHabits.some(item => item.id === habitId)) return;

      state.coins -= amount;
      state.totals.coinsPenalty += amount;
      const historyId = createId("history");
      state.history.unshift({
        id: historyId,
        type: "bad_habit",
        habitId: habit.id,
        name: habit.name,
        coins: amount,
        date: dateKey(),
        timestamp: new Date().toISOString()
      });
      saveState();
      updatePrimaryReadouts();
      showCoinFeedback(amount, "negative", sourceEl);
      scheduleRender(240);
      showUndoToast({
        type: "bad_habit",
        historyId,
        amount
      });
    }

    async function redeemReward(rewardId, sourceEl = null, buttonEl = null) {
      const reward = state.rewards.find(item => item.id === rewardId);
      if (!reward) return;
      const amount = parseAmount(reward.cost);
      if (state.coins < amount) {
        showToast("金币不足");
        return;
      }
      const confirmed = await askForConfirmation({
        title: "确认兑换奖励",
        message: `将消耗 ${formatNumber(amount)} 金币。确认兑换「${reward.name}」吗？`,
        confirmText: "确认兑换"
      });
      if (!confirmed) return;
      if (!state.rewards.some(item => item.id === rewardId)) return;
      if (state.coins < amount) {
        showToast("金币不足");
        return;
      }

      const previousCoins = state.coins;
      state.coins -= amount;
      state.totals.coinsSpent += amount;
      const historyId = createId("history");
      state.history.unshift({
        id: historyId,
        type: "reward_redeemed",
        rewardId: reward.id,
        name: reward.name,
        cost: amount,
        date: dateKey(),
        timestamp: new Date().toISOString()
      });
      saveState();
      const totals = summaryTotals();
      if (els.statSpent) els.statSpent.textContent = formatNumber(totals.coinsSpent);
      if (els.statPenalty) els.statPenalty.textContent = formatNumber(totals.coinsPenalty);
      if (sourceEl) {
        prepareActionCard(sourceEl);
        sourceEl.classList.remove("reward-redeemed");
        void sourceEl.offsetWidth;
        sourceEl.classList.add("reward-redeemed");
      }
      if (buttonEl) {
        buttonEl.classList.remove("reward-button-spend");
        void buttonEl.offsetWidth;
        buttonEl.classList.add("reward-button-spend");
      }
      animateCoinBalance(previousCoins, state.coins);
      showRewardRedeemedFeedback(sourceEl);
      scheduleRender(840);
      showUndoToast({
        type: "reward_redeemed",
        historyId,
        amount
      });
    }

      if (!state.habits.length) {
        els.habitList.innerHTML = `
          <div class="empty-state">
            <strong>还没有习惯</strong>

            <button class="button empty-action" data-open-habit>新建习惯</button>
          </div>

    function buildStatsRows(range) {
      const periods = lastDays(range === "year" ? 365 : range === "month" ? 30 : 7);
      const rows = periods.map(period => ({
        key: period.key,
        label: period.label,
        completed: 0,
        failed: 0,
        badHabits: 0,
        earned: 0,
        deducted: 0,
        net: 0,
        score: 0
      }));
      const byKey = new Map(rows.map(row => [row.key, row]));

      state.history.forEach(item => {
        const key = item.date;
        const row = byKey.get(key);
        if (!row) return;

        if (item.type === "task_completed" || item.type === "habit_completed") {
          row.completed += 1;
          row.earned += parseAmount(item.coins);
        }
        if (item.type === "task_failed" || item.type === "task_missed") {
          row.failed += 1;
          row.deducted += parseAmount(item.coins);
        }
        if (item.type === "bad_habit") {
          row.badHabits += 1;
          row.deducted += parseAmount(item.coins);
        }
        if (item.type === "reward_redeemed") {
          row.deducted += parseAmount(item.cost);
        }
      });

      rows.forEach(row => {
        row.net = row.earned - row.deducted;
        row.score = row.completed - row.failed - row.badHabits;
      });

      return rows;
    }

    function buildMonthlyHeatRows(month) {
      const monthStart = monthDateFromKey(month);
      const year = monthStart.getFullYear();
      const monthIndex = monthStart.getMonth();
      const dayCount = new Date(year, monthIndex + 1, 0).getDate();
      const rows = Array.from({ length: dayCount }, (_, index) => {
        const date = new Date(year, monthIndex, index + 1);
        return {
          key: dateKey(date),
          day: index + 1,
          completed: 0,
          failed: 0,
          badHabits: 0,
          earned: 0,
          deducted: 0,
          net: 0,
          hasRecord: false
        };
      });
      const byKey = new Map(rows.map(row => [row.key, row]));

      state.history.forEach(item => {
        const row = byKey.get(item.date);
        if (!row) return;
        row.hasRecord = true;

        if (item.type === "task_completed" || item.type === "habit_completed") {
          row.completed += 1;
          row.earned += parseAmount(item.coins);
        }
        if (item.type === "task_failed" || item.type === "task_missed") {
          row.failed += 1;
          row.deducted += parseAmount(item.coins);
        }
        if (item.type === "bad_habit") {
          row.badHabits += 1;
          row.deducted += parseAmount(item.coins);
        }
        if (item.type === "reward_redeemed") {
          row.deducted += parseAmount(item.cost);
        }
      });

      rows.forEach(row => {
        row.net = row.earned - row.deducted;
      });

      return rows;
    }

    function calendarDayClass(row, maxNet, maxLoss) {
      if (!row.hasRecord) return "empty";
      if (row.net > 0) {
        const ratio = maxNet ? row.net / maxNet : 1;
        if (ratio > 0.75) return "net-4";
        if (ratio > 0.5) return "net-3";
        if (ratio > 0.25) return "net-2";
        return "net-1";
      }
      if (row.net < 0) {
        const loss = Math.abs(row.net);
        const ratio = maxLoss ? loss / maxLoss : 1;
        if (ratio > 0.66) return "bad-3";
        if (ratio > 0.33) return "bad-2";
        return "bad-1";
      }
      return "net-0";
    }

    function historyTimeLabel(timestamp) {

      const date = new Date(timestamp);

    function signedAmountHtml(amount) {
      const value = Number(amount) || 0;
      const tone = value > 0 ? "positive" : value < 0 ? "negative" : "";
      const sign = value > 0 ? "+" : value < 0 ? "-" : "";
      return `<span class="detail-amount ${tone}">${sign}${formatNumber(Math.abs(value))}</span>`;
    }

    function dayEntries(day, matcher) {
      return state.history.filter(item => item.date === day && matcher(item));
    }

    function dayCoinSummary(day) {
      const completed = dayEntries(day, item => item.type === "task_completed");
      const habits = dayEntries(day, item => item.type === "habit_completed");
      const failed = dayEntries(day, item => item.type === "task_failed" || item.type === "task_missed");
      const badHabits = dayEntries(day, item => item.type === "bad_habit");
      const rewards = dayEntries(day, item => item.type === "reward_redeemed");
      const earned = completed.reduce((sum, item) => sum + parseAmount(item.coins), 0)
        + habits.reduce((sum, item) => sum + parseAmount(item.coins), 0);
      const deducted = failed.reduce((sum, item) => sum + parseAmount(item.coins), 0)
        + badHabits.reduce((sum, item) => sum + parseAmount(item.coins), 0)
        + rewards.reduce((sum, item) => sum + parseAmount(item.cost), 0);
      return {
        completed,
        habits,
        failed,
        badHabits,
        rewards,
        earned,
        deducted,
        net: earned - deducted
      };
    }
